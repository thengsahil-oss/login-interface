<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAHIL - Supercar Modifications</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <!-- Background -->
    <div class="background">
        <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80" alt="Background" class="bg-image">
        <div class="bg-overlay"></div>
        <div class="rocks">
            <div class="rock rock-1"></div>
            <div class="rock rock-2"></div>
            <div class="rock rock-3"></div>
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <button class="menu-btn">
                <span></span>
                <span></span>
                <span>Menu</span>
            </button>
            <div class="logo">SAHIL</div>
            <div class="nav-right">
                <button class="logout-btn">Logout</button>
                <button class="icon-btn">
                    <span></span>
                    <span></span>
                </button>
                <button class="close-btn"></button>
            </div>
        </nav>

        <!-- Hero Content -->
        <div class="hero">
            <div class="left-controls">
                <button class="control-btn up">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M18 15l-6-6-6 6"/>
                    </svg>
                </button>
                <div class="control-line"></div>
                <button class="control-btn down">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <path d="M6 9l6 6 6-6"/>
                    </svg>
                </button>
            </div>

            <div class="car-display">
                <div class="tagline">SPEED MEETS ELEGANCE</div>
                <h1 class="car-name">TURBO S</h1>
                <div class="car-container">
                    <img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80" alt="Sports Car" class="car-image">
                    <div class="feathers">
                        <div class="feather feather-1"></div>
                        <div class="feather feather-2"></div>
                        <div class="feather feather-3"></div>
                        <div class="feather feather-4"></div>
                        <div class="feather feather-5"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-info">
                <div class="info-card">
                    <div class="info-value">2.5S</div>
                    <div class="info-label">0-60 MPH<br>ACCELERATION</div>
                </div>
                <div class="info-center">
                    <svg class="play-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
                        <polygon points="5,3 19,12 5,21"/>
                    </svg>
                    <div class="info-text">EXPERIENCE THE<br>TURBO S IN ACTION</div>
                </div>
                <div class="info-card">
                    <div class="info-label">800 HP<br>TWIN TURBO<br>ENGINE</div>
                </div>
            </div>
        </div>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
